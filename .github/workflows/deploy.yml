name: Deploy to Timeweb VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload site via rsync over SSH
        uses: easingthemes/ssh-deploy@v1.5.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: "/var/www/html/"
          ARGS: "-rltDvz --delete --human-readable"
          EXCLUDE: "/.git/, /.github/, /.gitignore, /.DS_Store, /tools/, /auth-figma-sync/, /open-local.command, /README.md"

      - name: Fix ownership and reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chown -R www-data:www-data /var/www/html || true
            nginx -t && systemctl reload nginx || true

      - name: Ping IndexNow (Yandex + Bing)
        if: ${{ success() }}
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            INDEXNOW_HOST="sigidingo.online"
            INDEXNOW_KEY="c6b8f55e3f26472a9fe66f2131311a0b"
            INDEXNOW_KEY_LOCATION="https://${INDEXNOW_HOST}/${INDEXNOW_KEY}.txt"
            if [ -f /var/www/html/sitemap.xml ]; then
              grep -oE '<loc>[^<]+' /var/www/html/sitemap.xml | sed 's#<loc>##' | while read -r URL; do
                [ -z "$URL" ] && continue
                curl -sS --connect-timeout 3 --max-time 8 -G "https://yandex.com/indexnow" \
                  --data-urlencode "url=${URL}" \
                  --data-urlencode "key=${INDEXNOW_KEY}" \
                  --data-urlencode "keyLocation=${INDEXNOW_KEY_LOCATION}" >/dev/null || true
                curl -sS --connect-timeout 3 --max-time 8 -G "https://www.bing.com/indexnow" \
                  --data-urlencode "url=${URL}" \
                  --data-urlencode "key=${INDEXNOW_KEY}" \
                  --data-urlencode "keyLocation=${INDEXNOW_KEY_LOCATION}" >/dev/null || true
              done
            fi
